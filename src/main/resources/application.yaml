server:
  port: 8080

spring:
  application:
    name: insightflow
  datasource:
    url: jdbc:postgresql://localhost:5432/insightflow
    username: insightflow
    password: insightflow
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      client-id: insightflow-api
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        acks: all
        retries: 10
    consumer:
      group-id: insightflow-domain-events-consumer
      client-id: insightflow-api-consumer
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

insightflow:
  kafka:
    topics:
      domain-events: insightflow.domain-events
    consumer-groups:
      automation: insightflow-automation-consumer
  outbox:
    publisher:
      max-retry-count: 3
      base-delay-seconds: 10

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [correlationId=%X{correlationId:-none}] [tenant=%X{tenantSlug:-none}] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
