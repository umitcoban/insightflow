server:
  port: 8080

spring:
  application:
    name: insightflow
  datasource:
    url: jdbc:postgresql://localhost:5432/insightflow
    username: insightflow
    password: insightflow
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [correlationId=%X{correlationId:-none}] [tenant=%X{tenantSlug:-none}] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info